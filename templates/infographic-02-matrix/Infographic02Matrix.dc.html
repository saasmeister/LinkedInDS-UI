<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Infographic 02 · matrix" description="Bold Visual Method archetype (Infographic). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Infographic 4b · matrix" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-light-bg);font-family:var(--font-body);">
            <!-- centered headline -->
            <div style="position:absolute;top:70px;left:56px;right:56px;text-align:center;">
              <div style="font-weight:700;font-size:88px;line-height:1.04;color:var(--muted,#bdbdbd);letter-spacing:-0.02em;">The one-sheet<br>matrix title</div>
            </div>
            <!-- matrix container -->
            <div style="position:absolute;left:56px;right:56px;top:330px;bottom:70px;border:2.5px solid color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:14px;">
              <!-- row 1: main -->
              <div style="flex:0.9;display:flex;gap:14px;">
                <div style="width:230px;border:1.5px solid var(--rule,#d8d8d8);border-radius:8px;background:var(--canvas-light-bg);display:flex;align-items:center;justify-content:center;"><span style="font-weight:700;font-size:24px;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));">Row label</span></div>
                <div style="flex:1;border-radius:8px;background:var(--soft,#cdcdcd);display:flex;align-items:center;justify-content:center;"><div style="width:60%;height:22px;border-radius:6px;background:var(--soft,#b3b3b3);"></div></div>
              </div>
              <!-- row 2: 3x2 subgrid -->
              <div style="flex:1.6;display:flex;gap:14px;">
                <div style="width:230px;border:1.5px solid var(--rule,#d8d8d8);border-radius:8px;background:var(--canvas-light-bg);display:flex;align-items:center;justify-content:center;"><span style="font-weight:700;font-size:24px;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));">Row label</span></div>
                <div style="flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:14px;">
                  <div style="background:var(--soft,#c7c7c7);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:55%;height:16px;border-radius:5px;background:var(--soft,#a8a8a8);"></div></div>
                  <div style="background:var(--soft,#f1f1f1);border:1.5px solid var(--canvas-light-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:55%;height:16px;border-radius:5px;background:var(--soft,#dadada);"></div></div>
                  <div style="background:var(--soft,#f1f1f1);border:1.5px solid var(--canvas-light-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:55%;height:16px;border-radius:5px;background:var(--soft,#dadada);"></div></div>
                  <div style="background:var(--soft,#f1f1f1);border:1.5px solid var(--canvas-light-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:55%;height:16px;border-radius:5px;background:var(--soft,#dadada);"></div></div>
                  <div style="background:var(--soft,#f1f1f1);border:1.5px solid var(--canvas-light-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:55%;height:16px;border-radius:5px;background:var(--soft,#dadada);"></div></div>
                  <div style="background:var(--soft,#f1f1f1);border:1.5px solid var(--canvas-light-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:55%;height:16px;border-radius:5px;background:var(--soft,#dadada);"></div></div>
                </div>
              </div>
              <!-- row 3: 2 cells -->
              <div style="flex:0.9;display:flex;gap:14px;">
                <div style="width:230px;border:1.5px solid var(--rule,#d8d8d8);border-radius:8px;background:var(--canvas-light-bg);display:flex;align-items:center;justify-content:center;"><span style="font-weight:700;font-size:24px;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));">Row label</span></div>
                <div style="flex:1;display:flex;gap:14px;">
                  <div style="flex:1;background:var(--soft,#c7c7c7);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:40%;height:18px;border-radius:5px;background:var(--soft,#a8a8a8);"></div></div>
                  <div style="flex:1;background:var(--soft,#f1f1f1);border:1.5px solid var(--canvas-light-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:40%;height:18px;border-radius:5px;background:var(--soft,#dadada);"></div></div>
                </div>
              </div>
              <!-- row 4: 3 cells -->
              <div style="flex:0.9;display:flex;gap:14px;">
                <div style="width:230px;border:1.5px solid var(--rule,#d8d8d8);border-radius:8px;background:var(--canvas-light-bg);display:flex;align-items:center;justify-content:center;"><span style="font-weight:700;font-size:24px;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));">Row label</span></div>
                <div style="flex:1;display:flex;gap:14px;">
                  <div style="flex:1;background:var(--soft,#f1f1f1);border:1.5px solid var(--canvas-light-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:50%;height:16px;border-radius:5px;background:var(--soft,#dadada);"></div></div>
                  <div style="flex:1;background:var(--soft,#c7c7c7);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:50%;height:16px;border-radius:5px;background:var(--soft,#a8a8a8);"></div></div>
                  <div style="flex:1;background:var(--soft,#f1f1f1);border:1.5px solid var(--canvas-light-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;"><div style="width:50%;height:16px;border-radius:5px;background:var(--soft,#dadada);"></div></div>
                </div>
              </div>
              <!-- row 5: content / post -->
              <div style="flex:1.5;display:flex;gap:14px;">
                <div style="width:230px;border:1.5px solid var(--rule,#d8d8d8);border-radius:8px;background:var(--canvas-light-bg);display:flex;align-items:center;justify-content:center;"><span style="font-weight:700;font-size:24px;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));">Row label</span></div>
                <div style="flex:1;border:1.5px solid var(--rule,#d8d8d8);border-radius:8px;background:var(--soft,#fafafa);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;"><svg width="58" height="58" viewBox="0 0 80 80" fill="none" style="stroke:var(--rule,#c0c0c0)" stroke-width="4"><rect x="8" y="8" width="64" height="64" rx="8"></rect><circle cx="28" cy="28" r="8"></circle><path d="M14 64 L34 42 L48 58 L60 48 L70 64 Z" stroke-linejoin="round"></path></svg><span style="font-weight:700;font-size:15px;letter-spacing:0.12em;color:var(--muted,#b3b3b3);">POST / SCREENSHOT</span></div>
              </div>
            </div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
