            <div style="position:absolute;left:120px;top:440px;transform:rotate(-7deg);background:var(--canvas-light-bg);padding:18px 18px 60px;box-shadow:0 16px 40px rgba(0,0,0,0.18);width:300px;"><div style="height:300px;background:var(--soft,#e4e4e4);display:flex;align-items:center;justify-content:center;"><svg width="70" height="70" viewBox="0 0 80 80" fill="none" style="stroke:var(--rule,#b8b8b8)" stroke-width="4"><rect x="8" y="8" width="64" height="64" rx="8"></rect><circle cx="28" cy="28" r="8"></circle><path d="M14 64 L34 42 L48 58 L60 48 L70 64 Z" stroke-linejoin="round"></path></svg></div><div style="text-align:center;margin-top:18px;font-weight:600;font-size:26px;color:var(--brand-primary);">v1 — silence</div></div><div style="position:absolute;left:420px;top:540px;transform:rotate(5deg);background:var(--canvas-light-bg);padding:18px 18px 60px;box-shadow:0 16px 40px rgba(0,0,0,0.18);width:300px;"><div style="height:300px;background:var(--soft,#e4e4e4);display:flex;align-items:center;justify-content:center;"><svg width="70" height="70" viewBox="0 0 80 80" fill="none" style="stroke:var(--rule,#b8b8b8)" stroke-width="4"><rect x="8" y="8" width="64" height="64" rx="8"></rect><circle cx="28" cy="28" r="8"></circle><path d="M14 64 L34 42 L48 58 L60 48 L70 64 Z" stroke-linejoin="round"></path></svg></div><div style="text-align:center;margin-top:18px;font-weight:600;font-size:26px;color:var(--brand-primary);">v2 — a few signups</div></div><div style="position:absolute;left:720px;top:470px;transform:rotate(-3deg);background:var(--canvas-light-bg);padding:18px 18px 60px;box-shadow:0 16px 40px rgba(0,0,0,0.18);width:300px;"><div style="height:300px;background:var(--soft,#e4e4e4);display:flex;align-items:center;justify-content:center;"><svg width="70" height="70" viewBox="0 0 80 80" fill="none" style="stroke:var(--rule,#b8b8b8)" stroke-width="4"><rect x="8" y="8" width="64" height="64" rx="8"></rect><circle cx="28" cy="28" r="8"></circle><path d="M14 64 L34 42 L48 58 L60 48 L70 64 Z" stroke-linejoin="round"></path></svg></div><div style="text-align:center;margin-top:18px;font-weight:600;font-size:26px;color:var(--brand-primary);">v3 — it clicked</div></div>
            <div style="position:absolute;bottom:70px;left:56px;right:56px;text-align:center;"><span style="font-weight:400;font-size:30px;color:var(--muted,#8a8a8a);">Same team. Same week. The only variable was clarity.</span></div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
