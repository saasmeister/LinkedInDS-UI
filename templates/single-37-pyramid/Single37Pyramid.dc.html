<html>
<head>

<body>
<x-dc>
<!-- @template name="Single 37 · pyramid" description="Bold Visual Method archetype (Layers). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Layers 5c · pyramid" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-light-bg);font-family:var(--font-body);">
            <div style="position:absolute;inset:56px;border:1.5px dashed var(--canvas-light-line);pointer-events:none;"></div>
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--muted,#aeaeae);">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--muted,#aeaeae);">Category / function</span></div>
            <div style="position:absolute;top:144px;left:56px;right:56px;text-align:center;"><div style="font-weight:700;font-size:74px;line-height:1.04;color:var(--muted,#bdbdbd);letter-spacing:-0.02em;">A layered idea,<br>as a pyramid.</div><div style="font-weight:400;font-size:34px;color:var(--muted,#cccccc);margin-top:16px;">(A supporting aside in brackets.)</div></div>
            <div style="position:absolute;left:0;right:0;top:430px;display:flex;flex-direction:column;align-items:center;gap:4px;">
              <div style="width:360px;height:150px;background:var(--canvas-light-bg);clip-path:polygon(50% 0, 100% 100%, 0 100%);display:flex;align-items:flex-end;justify-content:center;padding-bottom:16px;box-sizing:border-box;"><div style="width:150px;height:20px;border-radius:6px;background:var(--canvas-light-line);"></div></div>
              <div style="width:580px;height:158px;background:var(--brand-primary);clip-path:polygon(11% 0, 89% 0, 100% 100%, 0 100%);display:flex;align-items:center;justify-content:center;"><div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><div style="width:186px;height:22px;border-radius:6px;background:var(--soft,#8c8c8c);"></div><div style="width:244px;height:11px;border-radius:5px;background:var(--soft,#565656);"></div><div style="width:195px;height:11px;border-radius:5px;background:var(--soft,#565656);"></div></div></div>
              <div style="width:800px;height:158px;background:var(--brand-primary);clip-path:polygon(11% 0, 89% 0, 100% 100%, 0 100%);display:flex;align-items:center;justify-content:center;"><div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><div style="width:256px;height:22px;border-radius:6px;background:var(--soft,#8c8c8c);"></div><div style="width:336px;height:11px;border-radius:5px;background:var(--soft,#565656);"></div><div style="width:269px;height:11px;border-radius:5px;background:var(--soft,#565656);"></div></div></div>
              <div style="width:1000px;height:158px;background:var(--brand-primary);clip-path:polygon(11% 0, 89% 0, 100% 100%, 0 100%);display:flex;align-items:center;justify-content:center;"><div style="display:flex;flex-direction:column;align-items:center;gap:10px;"><div style="width:320px;height:22px;border-radius:6px;background:var(--soft,#8c8c8c);"></div><div style="width:420px;height:11px;border-radius:5px;background:var(--soft,#565656);"></div><div style="width:336px;height:11px;border-radius:5px;background:var(--soft,#565656);"></div></div></div>
            </div>
            <div style="position:absolute;bottom:50px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:400;font-size:22px;color:var(--muted,#c2c2c2);">Source: ____</span><span style="font-weight:400;font-size:22px;color:var(--muted,#c2c2c2);">Helpful: share this</span></div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
