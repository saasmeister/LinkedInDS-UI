<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 42 · receipt" description="Bold Visual Method archetype (Bold). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Bold H8 · receipt" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-section-bg);font-family:var(--font-body);">
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--canvas-section-muted);">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--canvas-section-muted);">Category / function</span></div>
            <div style="position:absolute;top:140px;left:56px;right:56px;text-align:center;"><div style="font-weight:700;font-size:64px;line-height:1.0;color:var(--canvas-section-fg);letter-spacing:-0.02em;">The real cost of<br>cheap churn</div></div>
            <div style="position:absolute;left:170px;right:170px;top:430px;background:#1c1c1c;border-radius:14px;padding:50px 50px;">
              <div style="text-align:center;font-family:ui-monospace,Menlo,monospace;font-size:30px;color:color-mix(in srgb, var(--canvas-section-fg) 45%, var(--canvas-section-bg));letter-spacing:0.2em;margin-bottom:24px;">— INVOICE —</div>
              <div style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:2px dashed var(--rule,#444);"><span style="font-family:ui-monospace,Menlo,monospace;font-size:30px;color:var(--muted,#b8b8b8);">Lost MRR / mo</span><span style="font-family:ui-monospace,Menlo,monospace;font-size:30px;color:var(--muted,#b8b8b8);">$4,200</span></div>
              <div style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:2px dashed var(--rule,#444);"><span style="font-family:ui-monospace,Menlo,monospace;font-size:30px;color:var(--muted,#b8b8b8);">Re-acquisition</span><span style="font-family:ui-monospace,Menlo,monospace;font-size:30px;color:var(--muted,#b8b8b8);">$6,800</span></div>
              <div style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:2px dashed var(--rule,#444);"><span style="font-family:ui-monospace,Menlo,monospace;font-size:30px;color:var(--muted,#b8b8b8);">Support drain</span><span style="font-family:ui-monospace,Menlo,monospace;font-size:30px;color:var(--muted,#b8b8b8);">$1,500</span></div>
              <div style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:2px dashed var(--rule,#444);"><span style="font-family:ui-monospace,Menlo,monospace;font-size:30px;color:var(--muted,#b8b8b8);">Word of mouth</span><span style="font-family:ui-monospace,Menlo,monospace;font-size:30px;color:var(--muted,#b8b8b8);">priceless</span></div>
              <div style="height:14px;"></div>
              <div style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:2px dashed var(--rule,#444);"><span style="font-family:ui-monospace,Menlo,monospace;font-size:30px;color:var(--canvas-section-fg);">TOTAL / year</span><span style="font-family:ui-monospace,Menlo,monospace;font-size:30px;color:var(--canvas-section-fg);">$150,000</span></div>
            </div>
            <div style="position:absolute;bottom:70px;left:56px;right:56px;text-align:center;"><span style="font-weight:400;font-size:30px;color:var(--muted,#8a988f);">One activation fix is cheaper than one month of this.</span></div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
