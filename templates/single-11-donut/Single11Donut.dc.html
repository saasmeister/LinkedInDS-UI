<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 11 · donut" description="Bold Visual Method archetype (Single). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Single 1c · donut" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-light-bg);font-family:var(--font-body);">
            <div style="position:absolute;inset:56px;border:1.5px dashed var(--canvas-light-line);pointer-events:none;"></div>
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--muted,#aeaeae);">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--muted,#aeaeae);">Category / function</span></div>
            <div style="position:absolute;top:150px;left:56px;right:56px;text-align:center;">
              <div style="font-weight:700;font-size:78px;line-height:1.04;color:var(--muted,#bdbdbd);letter-spacing:-0.02em;">Where the time<br>actually goes.</div>
              <div style="font-weight:400;font-size:36px;color:var(--muted,#cccccc);margin-top:18px;">(A supporting aside in brackets.)</div>
            </div>
            <div style="position:absolute;left:0;right:0;top:470px;display:flex;justify-content:center;">
              <div style="position:relative;width:520px;height:520px;border-radius:50%;background:conic-gradient(color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg)) 0 45%, var(--canvas-light-line) 45% 72%, var(--canvas-light-soft) 72% 100%);">
                <div style="position:absolute;inset:140px;border-radius:50%;background:var(--canvas-light-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;">
                  <span style="font-weight:700;font-size:72px;color:var(--muted,#bdbdbd);letter-spacing:-0.03em;">00</span>
                  <span style="font-weight:400;font-size:24px;color:var(--muted,#c8c8c8);">center label</span>
                </div>
              </div>
            </div>
            <div style="position:absolute;left:56px;right:56px;top:1040px;display:flex;flex-direction:column;gap:18px;align-items:center;">
              <div style="display:flex;align-items:center;gap:18px;width:560px;"><span style="width:30px;height:30px;border-radius:7px;background:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));"></span><div style="flex:1;height:16px;border-radius:6px;background:var(--soft,#e2e2e2);"></div><span style="font-weight:700;font-size:30px;color:var(--muted,#bdbdbd);">45%</span></div>
              <div style="display:flex;align-items:center;gap:18px;width:560px;"><span style="width:30px;height:30px;border-radius:7px;background:var(--canvas-light-line);"></span><div style="flex:1;height:16px;border-radius:6px;background:var(--soft,#e2e2e2);"></div><span style="font-weight:700;font-size:30px;color:var(--muted,#bdbdbd);">27%</span></div>
              <div style="display:flex;align-items:center;gap:18px;width:560px;"><span style="width:30px;height:30px;border-radius:7px;background:var(--canvas-light-soft);border:1.5px solid var(--rule,#d4d4d4);"></span><div style="flex:1;height:16px;border-radius:6px;background:var(--soft,#e2e2e2);"></div><span style="font-weight:700;font-size:30px;color:var(--muted,#bdbdbd);">28%</span></div>
            </div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
