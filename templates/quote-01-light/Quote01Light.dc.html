<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Quote 01 · light" description="Bold Visual Method archetype (Quote). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Quote · light" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-light-bg);font-family:var(--font-body);">
            <div style="position:absolute;inset:64px;border:1.5px dashed var(--canvas-light-line);pointer-events:none;"></div>
            <div style="position:absolute;top:96px;left:96px;right:96px;display:flex;justify-content:space-between;align-items:center;">
              <div style="display:flex;align-items:center;gap:16px;"><div style="width:44px;height:44px;border:1.5px solid var(--canvas-light-line);border-radius:8px;"></div><span style="font-weight:600;font-size:22px;letter-spacing:0.08em;color:var(--muted,#aeaeae);">NAME</span></div>
              <span style="font-weight:600;font-size:22px;letter-spacing:0.08em;color:var(--muted,#aeaeae);">CATEGORY / FUNCTION</span>
            </div>
            <!-- quote vertically centered, left -->
            <div style="position:absolute;left:96px;right:150px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;">
              <div style="font-weight:700;font-size:150px;line-height:0.6;color:var(--canvas-light-soft);">“</div>
              <span style="font-weight:700;font-size:18px;letter-spacing:0.14em;color:var(--muted,#c6c6c6);margin-top:10px;">QUOTE</span>
              <div style="font-weight:600;font-size:62px;line-height:1.22;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));letter-spacing:-0.01em;margin-top:18px;max-width:820px;">One sentence pulled straight from the post, set large.</div>
              <!-- attribution -->
              <div style="display:flex;align-items:center;gap:28px;margin-top:70px;">
                <div style="width:130px;height:130px;border-radius:50%;border:1.5px solid var(--rule,#d2d2d2);background:var(--soft,#f7f7f7);display:flex;align-items:center;justify-content:center;">
                  <svg width="64" height="64" viewBox="0 0 80 80" fill="none" stroke="var(--canvas-light-line)" stroke-width="4"><circle cx="40" cy="30" r="15"></circle><path d="M14 70 C14 50 66 50 66 70" stroke-linecap="round"></path></svg>
                </div>
                <div style="display:flex;flex-direction:column;gap:14px;">
                  <div style="width:280px;height:26px;border-radius:6px;background:var(--soft,#dadada);"></div>
                  <div style="width:200px;height:20px;border-radius:6px;background:var(--soft,#e6e6e6);"></div>
                </div>
              </div>
            </div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
