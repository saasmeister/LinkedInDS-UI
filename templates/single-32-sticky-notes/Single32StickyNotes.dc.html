<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 32 · sticky notes" description="Bold Visual Method archetype (Bold). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Bold I5 · sticky notes" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-light-bg);font-family:var(--font-body);">
            <div style="position:absolute;inset:56px;border:1.5px dashed var(--canvas-light-line);pointer-events:none;"></div>
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">Category / function</span></div>
            <div style="position:absolute;top:140px;left:56px;right:56px;"><div style="font-weight:700;font-size:60px;line-height:1.0;color:var(--brand-primary);letter-spacing:-0.02em;">What users actually<br>said in interviews</div></div>
            <div style="position:absolute;left:110px;top:440px;width:260px;height:260px;background:var(--canvas-light-soft);transform:rotate(-5deg);box-shadow:0 12px 30px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;"><span style="font-weight:600;font-size:30px;line-height:1.25;color:var(--brand-primary);">“I forgot it existed”</span></div><div style="position:absolute;left:400px;top:420px;width:260px;height:260px;background:var(--soft,#dedede);transform:rotate(4deg);box-shadow:0 12px 30px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;"><span style="font-weight:600;font-size:30px;line-height:1.25;color:var(--brand-primary);">“Couldn’t find the value”</span></div><div style="position:absolute;left:690px;top:460px;width:260px;height:260px;background:var(--soft,#e6e6e6);transform:rotate(-3deg);box-shadow:0 12px 30px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;"><span style="font-weight:600;font-size:30px;line-height:1.25;color:var(--brand-primary);">“Felt like work”</span></div>
            <div style="position:absolute;left:180px;top:760px;width:260px;height:260px;background:var(--canvas-light-soft);transform:rotate(6deg);box-shadow:0 12px 30px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;"><span style="font-weight:600;font-size:30px;line-height:1.25;color:var(--brand-primary);">“Setup was too long”</span></div><div style="position:absolute;left:470px;top:800px;width:260px;height:260px;background:var(--canvas-light-soft);transform:rotate(-6deg);box-shadow:0 12px 30px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;"><span style="font-weight:600;font-size:30px;line-height:1.25;color:var(--brand-primary);">“No idea what to do first”</span></div><div style="position:absolute;left:760px;top:790px;width:260px;height:260px;background:var(--soft,#dedede);transform:rotate(3deg);box-shadow:0 12px 30px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;"><span style="font-weight:600;font-size:30px;line-height:1.25;color:var(--brand-primary);">“Just used a spreadsheet”</span></div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
