<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 17 · 2x2 matrix" description="Bold Visual Method archetype (Bold). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Bold B2 · 2x2 matrix" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-light-bg);font-family:var(--font-body);">
            <div style="position:absolute;inset:56px;border:1.5px dashed var(--canvas-light-line);pointer-events:none;"></div>
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">Category / function</span></div>
            <div style="position:absolute;top:150px;left:56px;right:56px;text-align:center;"><span style="font-weight:700;font-size:18px;letter-spacing:0.14em;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));">THE PRIORITIZATION MAP</span><div style="font-weight:700;font-size:66px;line-height:1.04;color:var(--brand-primary);letter-spacing:-0.02em;margin-top:12px;">What to build next</div></div>
            <div style="position:absolute;left:170px;right:170px;top:392px;bottom:188px;">
              <div style="position:absolute;left:0;right:0;top:0;bottom:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:20px;">
                <div style="border:1.5px solid var(--rule,#d8d8d8);border-radius:16px;background:var(--soft,#fafafa);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px;"><span style="font-weight:700;font-size:36px;color:var(--brand-primary);">Big bets</span><span style="font-weight:400;font-size:22px;color:var(--muted,#8a8a8a);">high impact · high effort</span></div><div style="border:1.5px solid var(--brand-primary);border-radius:16px;background:var(--brand-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px;"><span style="font-weight:700;font-size:36px;color:var(--canvas-light-bg);">Quick wins</span><span style="font-weight:400;font-size:22px;color:var(--muted,#b8b8b8);">high impact · low effort</span></div>
                <div style="border:1.5px solid var(--rule,#d8d8d8);border-radius:16px;background:var(--soft,#fafafa);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px;"><span style="font-weight:700;font-size:36px;color:var(--brand-primary);">Money pits</span><span style="font-weight:400;font-size:22px;color:var(--muted,#8a8a8a);">low impact · high effort</span></div><div style="border:1.5px solid var(--rule,#d8d8d8);border-radius:16px;background:var(--soft,#fafafa);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px;"><span style="font-weight:700;font-size:36px;color:var(--brand-primary);">Fill-ins</span><span style="font-weight:400;font-size:22px;color:var(--muted,#8a8a8a);">low impact · low effort</span></div>
              </div>
              <div style="position:absolute;left:-120px;top:0;bottom:0;width:34px;display:flex;align-items:center;justify-content:center;"><span style="writing-mode:vertical-rl;transform:rotate(180deg);font-weight:700;font-size:26px;letter-spacing:0.06em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">IMPACT →</span></div>
              <div style="position:absolute;left:0;right:0;bottom:-70px;text-align:center;"><span style="font-weight:700;font-size:26px;letter-spacing:0.06em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">EFFORT →</span></div>
            </div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
