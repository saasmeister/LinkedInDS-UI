<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 39 · terminal" description="Bold Visual Method archetype (Bold). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Bold G2 · terminal" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-section-bg);font-family:var(--font-body);">
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--canvas-section-muted);">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--canvas-section-muted);">Category / function</span></div>
            <div style="position:absolute;top:150px;left:56px;right:56px;"><div style="font-weight:700;font-size:72px;line-height:1.0;color:var(--canvas-section-fg);letter-spacing:-0.02em;">Ship small.<br>Ship often.</div></div>
            <div style="position:absolute;left:80px;right:80px;top:470px;bottom:90px;background:color-mix(in srgb, var(--canvas-section-bg) 80%, #000);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,0.4);overflow:hidden;">
              <div style="height:74px;background:color-mix(in srgb, var(--canvas-section-bg) 88%, #000);display:flex;align-items:center;gap:14px;padding:0 28px;"><span style="width:22px;height:22px;border-radius:50%;background:color-mix(in srgb, var(--canvas-section-fg) 18%, var(--canvas-section-bg));"></span><span style="width:22px;height:22px;border-radius:50%;background:color-mix(in srgb, var(--canvas-section-fg) 30%, var(--canvas-section-bg));"></span><span style="width:22px;height:22px;border-radius:50%;background:color-mix(in srgb, var(--canvas-section-fg) 45%, var(--canvas-section-bg));"></span><span style="margin-left:18px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:32px;line-height:1.3;font-size:24px;color:color-mix(in srgb, var(--canvas-section-fg) 45%, var(--canvas-section-bg));">growth — zsh</span></div>
              <div style="padding:38px 40px;">
                <div style="margin-bottom:18px;"><span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:32px;line-height:1.3;color:var(--brand-accent);">$</span> <span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:32px;line-height:1.3;color:var(--canvas-section-fg);">./ship.sh --feature onboarding</span></div>
                <div style="margin-bottom:18px;"><span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:32px;line-height:1.3;color:var(--canvas-section-muted);">→ writing migration ........ done</span></div>
                <div style="margin-bottom:18px;"><span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:32px;line-height:1.3;color:var(--canvas-section-muted);">→ running tests ............ 142 passed</span></div>
                <div style="margin-bottom:18px;"><span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:32px;line-height:1.3;color:var(--canvas-section-muted);">→ rolling out to 5% ........ ok</span></div>
                <div style="margin-bottom:18px;"><span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:32px;line-height:1.3;color:var(--canvas-section-fg);">✓ shipped in 3h 12m</span></div>
                <div style="margin-bottom:18px;"><span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:32px;line-height:1.3;color:var(--brand-accent);">$</span> <span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:32px;line-height:1.3;color:var(--canvas-section-fg);">_</span></div>
              </div>
            </div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
