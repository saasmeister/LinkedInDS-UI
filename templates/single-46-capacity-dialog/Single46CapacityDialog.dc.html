<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 46 · capacity dialog" description="Bold Visual Method archetype (UI). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="UI E1 · capacity dialog" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-section-bg);font-family:var(--font-body);">
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--canvas-section-muted);">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--canvas-section-muted);">Category / function</span></div>
            <div style="position:absolute;top:150px;left:56px;right:56px;text-align:center;"><span style="font-weight:300;font-size:88px;color:var(--canvas-section-fg);">“We’re at capacity”</span></div>
            <div style="position:absolute;left:90px;right:90px;top:430px;background:var(--soft,#ededed);border-radius:24px;padding:44px 50px;box-shadow:0 30px 80px rgba(0,0,0,0.35);">
              <div style="display:flex;gap:14px;"><span style="width:26px;height:26px;border-radius:50%;background:color-mix(in srgb, var(--canvas-section-fg) 18%, var(--canvas-section-bg));"></span><span style="width:26px;height:26px;border-radius:50%;background:var(--soft,#6a6a6a);"></span><span style="width:26px;height:26px;border-radius:50%;background:var(--soft,#8a8a8a);"></span></div>
              <div style="display:flex;align-items:center;gap:26px;margin-top:48px;"><div style="width:74px;height:74px;border-radius:14px;background:var(--canvas-section-fg);border:2px solid var(--rule,#cfcfcf);flex:none;"></div><span style="font-weight:700;font-size:54px;color:var(--canvas-section-bg);letter-spacing:-0.01em;">Maximum capacity reached</span></div>
              <div style="display:flex;height:96px;border-radius:14px;overflow:hidden;margin-top:40px;"><div style="width:58%;background:var(--canvas-section-bg);height:100%;"></div><div style="width:18%;background:var(--soft,#767676);height:100%;"></div><div style="width:11%;background:var(--soft,#a3a3a3);height:100%;"></div><div style="width:8%;background:var(--soft,#cfcfcf);height:100%;"></div><div style="width:5%;background:var(--soft,#e0e0e0);height:100%;"></div></div>
              <div style="display:flex;flex-wrap:wrap;gap:20px 40px;margin-top:28px;"><div style="display:flex;align-items:center;gap:12px;"><span style="width:22px;height:22px;border-radius:50%;background:var(--canvas-section-bg);"></span><span style="font-weight:600;font-size:24px;color:var(--canvas-section-bg);">Bug fixes</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:22px;height:22px;border-radius:50%;background:var(--soft,#767676);"></span><span style="font-weight:600;font-size:24px;color:var(--canvas-section-bg);">Meetings</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:22px;height:22px;border-radius:50%;background:var(--soft,#a3a3a3);"></span><span style="font-weight:600;font-size:24px;color:var(--canvas-section-bg);">Roadmap</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:22px;height:22px;border-radius:50%;background:var(--soft,#cfcfcf);"></span><span style="font-weight:600;font-size:24px;color:var(--canvas-section-bg);">Actual building</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:22px;height:22px;border-radius:50%;background:var(--soft,#e0e0e0);"></span><span style="font-weight:600;font-size:24px;color:var(--canvas-section-bg);">Other</span></div></div>
              <div style="display:flex;gap:26px;margin-top:56px;"><div style="flex:1;border:2px solid var(--canvas-section-bg);border-radius:14px;padding:28px 0;text-align:center;"><span style="font-weight:500;font-size:36px;color:var(--canvas-section-bg);">Ignore and continue</span></div><div style="flex:1;background:var(--canvas-section-bg);border-radius:14px;padding:28px 0;text-align:center;"><span style="font-weight:500;font-size:36px;color:var(--canvas-section-fg);">Fix the system</span></div></div>
            </div>
            <div style="position:absolute;bottom:56px;left:56px;right:56px;text-align:center;"><span style="font-weight:400;font-size:26px;color:var(--muted,#8a988f);">Most teams hit “ignore”. The best ones open the panel.</span></div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
