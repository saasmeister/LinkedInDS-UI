<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Carousel 07 · divider" description="Bold Visual Method archetype (Carousel). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Carousel 7c · divider" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-section-bg);font-family:var(--font-body);">
            <svg style="position:absolute;inset:0;" width="1080" height="1350" viewBox="0 0 1080 1350" fill="rgba(0,0,0,0.22)"><path d="M0 470 L1080 760 L1080 0 L0 0 Z"></path></svg>
            <div style="position:absolute;inset:56px;border:1.5px dashed rgba(255,255,255,0.13);pointer-events:none;"></div>
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--canvas-section-muted);">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--canvas-section-muted);">Category / function</span></div>
            <div style="position:absolute;left:56px;right:56px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;">
              <span style="font-weight:700;font-size:18px;letter-spacing:0.14em;color:var(--muted,#7f7f7f);">SECTION DIVIDER</span>
              <div style="font-weight:700;font-size:120px;line-height:0.98;color:var(--muted,#cfcfcf);letter-spacing:-0.03em;margin-top:18px;">Breakdown<br>↓</div>
            </div>
            <div style="position:absolute;left:56px;bottom:130px;display:flex;gap:14px;">
              <div style="width:120px;height:54px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.28);background:transparent;display:flex;align-items:center;justify-content:center;"><span style="font-weight:600;font-size:18px;color:var(--muted,#7f7f7f);">Cover</span></div><div style="width:120px;height:54px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.28);background:transparent;display:flex;align-items:center;justify-content:center;"><span style="font-weight:600;font-size:18px;color:var(--muted,#7f7f7f);">Context</span></div><div style="width:120px;height:54px;border-radius:10px;border:1.5px solid var(--rule,#cfcfcf);background:rgba(207,207,207,0.16);display:flex;align-items:center;justify-content:center;"><span style="font-weight:600;font-size:18px;color:var(--muted,#cfcfcf);">Breakdown</span></div><div style="width:120px;height:54px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.28);background:transparent;display:flex;align-items:center;justify-content:center;"><span style="font-weight:600;font-size:18px;color:var(--muted,#7f7f7f);">Results</span></div><div style="width:120px;height:54px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.28);background:transparent;display:flex;align-items:center;justify-content:center;"><span style="font-weight:600;font-size:18px;color:var(--muted,#7f7f7f);">CTA</span></div>
            </div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
