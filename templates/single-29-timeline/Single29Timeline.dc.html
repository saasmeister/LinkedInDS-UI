<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 29 · timeline" description="Bold Visual Method archetype (Bold). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Bold I1 · timeline" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-light-bg);font-family:var(--font-body);">
            <div style="position:absolute;inset:56px;border:1.5px dashed var(--canvas-light-line);pointer-events:none;"></div>
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">Category / function</span></div>
            <div style="position:absolute;top:150px;left:56px;right:56px;"><div style="font-weight:700;font-size:64px;line-height:1.0;color:var(--brand-primary);letter-spacing:-0.02em;">0 → $1M ARR</div></div>
            <div style="position:absolute;left:96px;right:56px;top:430px;height:760px;">
              <div style="position:absolute;left:39px;top:30px;bottom:30px;width:4px;background:var(--brand-primary);"></div>
              <div style="position:absolute;left:0;top:0px;display:flex;gap:30px;align-items:flex-start;"><div style="width:56px;height:56px;border-radius:50%;background:var(--canvas-light-bg);border:4px solid var(--brand-primary);flex:none;margin-left:12px;"></div><div style="padding-top:6px;"><div style="font-weight:700;font-size:34px;color:var(--brand-primary);">Month 0 — first 5 design partners</div><div style="font-weight:400;font-size:27px;color:var(--canvas-light-muted);margin-top:4px;">Hand-built onboarding, weekly calls</div></div></div>
              <div style="position:absolute;left:0;top:180px;display:flex;gap:30px;align-items:flex-start;"><div style="width:56px;height:56px;border-radius:50%;background:var(--canvas-light-bg);border:4px solid var(--brand-primary);flex:none;margin-left:12px;"></div><div style="padding-top:6px;"><div style="font-weight:700;font-size:34px;color:var(--brand-primary);">Month 4 — repeatable activation</div><div style="font-weight:400;font-size:27px;color:var(--canvas-light-muted);margin-top:4px;">One flow, 60% reach value</div></div></div>
              <div style="position:absolute;left:0;top:360px;display:flex;gap:30px;align-items:flex-start;"><div style="width:56px;height:56px;border-radius:50%;background:var(--canvas-light-bg);border:4px solid var(--brand-primary);flex:none;margin-left:12px;"></div><div style="padding-top:6px;"><div style="font-weight:700;font-size:34px;color:var(--brand-primary);">Month 9 — first paid channel</div><div style="font-weight:400;font-size:27px;color:var(--canvas-light-muted);margin-top:4px;">Founder content → demos</div></div></div>
              <div style="position:absolute;left:0;top:540px;display:flex;gap:30px;align-items:flex-start;"><div style="width:80px;height:80px;border-radius:50%;background:var(--brand-primary);border:4px solid var(--brand-primary);flex:none;margin-left:0;"></div><div style="padding-top:6px;"><div style="font-weight:700;font-size:34px;color:var(--brand-primary);">Month 18 — $1M ARR</div><div style="font-weight:400;font-size:27px;color:var(--canvas-light-muted);margin-top:4px;">Same wedge, just louder</div></div></div>
            </div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
