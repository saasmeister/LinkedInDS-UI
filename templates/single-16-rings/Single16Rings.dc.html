<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 16 · rings" description="Bold Visual Method archetype (Bold). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Bold I4 · rings" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-section-bg);font-family:var(--font-body);">
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--canvas-section-muted);">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--canvas-section-muted);">Category / function</span></div>
            <div style="position:absolute;top:150px;left:56px;right:56px;"><div style="font-weight:700;font-size:64px;line-height:1.0;color:var(--canvas-section-fg);letter-spacing:-0.02em;">The funnel in 3 rings</div></div>
            <svg style="position:absolute;left:0;top:0;font-family:var(--font-body)" width="1080" height="1350">
              <circle cx="280" cy="720" r="150" fill="none" style="stroke:var(--rule,#444)" stroke-width="26"></circle><circle cx="280" cy="720" r="150" fill="none" stroke="var(--canvas-section-fg)" stroke-width="26" stroke-linecap="round" stroke-dasharray="942.48" stroke-dashoffset="169.65" transform="rotate(-90 280 720)"></circle><text x="280" y="732" text-anchor="middle" font-size="56" font-weight="800" fill="var(--canvas-section-fg)">82%</text><circle cx="540" cy="720" r="150" fill="none" style="stroke:var(--rule,#444)" stroke-width="26"></circle><circle cx="540" cy="720" r="150" fill="none" stroke="var(--canvas-section-fg)" stroke-width="26" stroke-linecap="round" stroke-dasharray="942.48" stroke-dashoffset="556.06" transform="rotate(-90 540 720)"></circle><text x="540" y="732" text-anchor="middle" font-size="56" font-weight="800" fill="var(--canvas-section-fg)">41%</text><circle cx="800" cy="720" r="150" fill="none" style="stroke:var(--rule,#444)" stroke-width="26"></circle><circle cx="800" cy="720" r="150" fill="none" stroke="var(--canvas-section-fg)" stroke-width="26" stroke-linecap="round" stroke-dasharray="942.48" stroke-dashoffset="829.38" transform="rotate(-90 800 720)"></circle><text x="800" y="732" text-anchor="middle" font-size="56" font-weight="800" fill="var(--canvas-section-fg)">12%</text>
              <text x="280" y="950" text-anchor="middle" font-size="34" font-weight="600" style="fill:var(--muted,#b8c2bb)">Signup</text>
              <text x="540" y="950" text-anchor="middle" font-size="34" font-weight="600" style="fill:var(--muted,#b8c2bb)">Activated</text>
              <text x="800" y="950" text-anchor="middle" font-size="34" font-weight="600" style="fill:var(--muted,#b8c2bb)">Paid</text>
            </svg>
            <div style="position:absolute;bottom:120px;left:56px;right:56px;text-align:center;"><span style="font-weight:400;font-size:34px;color:var(--muted,#8a988f);">The drop between ring 1 and 2 is where your revenue leaks.</span></div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
