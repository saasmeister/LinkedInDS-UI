            <div style="position:absolute;left:56px;top:150px;width:560px;"><span style="font-weight:700;font-size:18px;letter-spacing:0.14em;color:var(--muted,#c6c6c6);">HEADING</span><div style="font-weight:700;font-size:60px;line-height:1.04;color:var(--muted,#bdbdbd);letter-spacing:-0.02em;margin-top:12px;">Set the scene</div></div>
            <div style="position:absolute;left:56px;right:480px;top:430px;display:flex;flex-direction:column;gap:18px;">
              <div style="border:1.5px solid var(--rule,#d8d8d8);border-radius:14px;background:var(--soft,#fafafa);padding:20px 24px;display:flex;align-items:center;gap:18px;"><span style="font-weight:700;font-size:16px;letter-spacing:0.1em;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));white-space:nowrap;">Example 1</span><div style="flex:1;height:12px;border-radius:5px;background:var(--soft,#e7e7e7);"></div></div><div style="border:1.5px solid var(--rule,#d8d8d8);border-radius:14px;background:var(--soft,#fafafa);padding:20px 24px;display:flex;align-items:center;gap:18px;"><span style="font-weight:700;font-size:16px;letter-spacing:0.1em;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));white-space:nowrap;">Example 2</span><div style="flex:1;height:12px;border-radius:5px;background:var(--soft,#e7e7e7);"></div></div><div style="border:1.5px solid var(--rule,#d8d8d8);border-radius:14px;background:var(--soft,#fafafa);padding:20px 24px;display:flex;align-items:center;gap:18px;"><span style="font-weight:700;font-size:16px;letter-spacing:0.1em;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));white-space:nowrap;">Status quo</span><div style="flex:1;height:12px;border-radius:5px;background:var(--soft,#e7e7e7);"></div></div><div style="border:1.5px solid var(--rule,#d8d8d8);border-radius:14px;background:var(--soft,#fafafa);padding:20px 24px;display:flex;align-items:center;gap:18px;"><span style="font-weight:700;font-size:16px;letter-spacing:0.1em;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));white-space:nowrap;">Definition</span><div style="flex:1;height:12px;border-radius:5px;background:var(--soft,#e7e7e7);"></div></div><div style="border:1.5px solid var(--rule,#d8d8d8);border-radius:14px;background:var(--soft,#fafafa);padding:20px 24px;display:flex;align-items:center;gap:18px;"><span style="font-weight:700;font-size:16px;letter-spacing:0.1em;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));white-space:nowrap;">My take</span><div style="flex:1;height:12px;border-radius:5px;background:var(--soft,#e7e7e7);"></div></div><div style="border:1.5px solid var(--rule,#d8d8d8);border-radius:14px;background:var(--soft,#fafafa);padding:20px 24px;display:flex;align-items:center;gap:18px;"><span style="font-weight:700;font-size:16px;letter-spacing:0.1em;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));white-space:nowrap;">Statement</span><div style="flex:1;height:12px;border-radius:5px;background:var(--soft,#e7e7e7);"></div></div>
            </div>
            <div style="position:absolute;right:56px;top:430px;width:400px;bottom:170px;border:1.5px solid var(--rule,#d2d2d2);border-radius:16px;background:var(--soft,#f5f5f5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;"><svg width="70" height="70" viewBox="0 0 80 80" fill="none" style="stroke:var(--rule,#c0c0c0)" stroke-width="4"><rect x="8" y="8" width="64" height="64" rx="8"></rect><circle cx="28" cy="28" r="8"></circle><path d="M14 64 L34 42 L48 58 L60 48 L70 64 Z" stroke-linejoin="round"></path></svg><span style="font-weight:700;font-size:18px;letter-spacing:0.12em;color:var(--muted,#b3b3b3);">SCREENSHOT</span></div>
            <div style="position:absolute;bottom:50px;right:56px;width:84px;height:84px;border:1.5px solid var(--rule,#b6b6b6);border-radius:50%;display:flex;align-items:center;justify-content:center;"><span style="font-size:42px;line-height:1;color:var(--muted,#b6b6b6);">→</span></div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
