<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 10 · pie" description="Bold Visual Method archetype (Single). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Single 1a · pie" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-light-bg);font-family:var(--font-body);">
            <div style="position:absolute;inset:56px;border:1.5px dashed var(--canvas-light-line);pointer-events:none;"></div>
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--muted,#aeaeae);">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:var(--muted,#aeaeae);">Category / function</span></div>
            <div style="position:absolute;top:150px;left:56px;right:56px;text-align:center;">
              <div style="font-weight:700;font-size:78px;line-height:1.04;color:var(--muted,#bdbdbd);letter-spacing:-0.02em;">40–60% of users sign<br>up and never return.</div>
              <div style="font-weight:400;font-size:36px;color:var(--muted,#cccccc);margin-top:18px;">(A supporting aside in brackets.)</div>
            </div>
            <div style="position:absolute;left:0;right:0;top:500px;display:flex;justify-content:center;">
              <div style="position:relative;width:660px;height:660px;border-radius:50%;background:conic-gradient(var(--brand-primary) 0 60%, var(--soft,#d6d6d6) 60% 100%);box-shadow:0 14px 44px rgba(0,0,0,0.10);">
                <div style="position:absolute;left:362px;top:312px;text-align:left;">
                  <div style="font-weight:700;font-size:108px;line-height:0.9;color:var(--muted,#e8e8e8);letter-spacing:-0.03em;">60%</div>
                  <div style="font-weight:400;font-size:30px;line-height:1.25;color:color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg));margin-top:12px;max-width:230px;">Label sits inside the slice.</div>
                </div>
                <div style="position:absolute;left:120px;top:236px;text-align:left;">
                  <div style="font-weight:700;font-size:66px;line-height:0.9;color:var(--muted,#7e7e7e);letter-spacing:-0.03em;">40%</div>
                  <div style="font-weight:400;font-size:26px;line-height:1.25;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));margin-top:10px;max-width:180px;">Other slice.</div>
                </div>
              </div>
            </div>
            <span style="position:absolute;bottom:56px;right:56px;font-weight:400;font-size:22px;color:var(--muted,#c2c2c2);">Source: ____</span>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
