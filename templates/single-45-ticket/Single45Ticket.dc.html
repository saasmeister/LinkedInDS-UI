<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 45 · ticket" description="Bold Visual Method archetype (Bold). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Bold I10 · ticket" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-light-bg);font-family:var(--font-body);">
            <div style="position:absolute;inset:56px;border:1.5px dashed var(--canvas-light-line);pointer-events:none;"></div>
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">Category / function</span></div>
            <div style="position:absolute;top:150px;left:56px;right:56px;"><div style="font-weight:700;font-size:60px;line-height:1.0;color:var(--brand-primary);letter-spacing:-0.02em;">Your roadmap,<br>one ticket</div></div>
            <div style="position:absolute;left:90px;right:90px;top:480px;background:var(--soft,#f7f7f7);border:1.5px solid var(--canvas-light-line);border-radius:24px;overflow:hidden;">
              <div style="display:flex;">
                <div style="flex:1;padding:44px 50px;border-right:3px dashed color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg));">
                  <div style="font-family:ui-monospace,Menlo,monospace;font-size:26px;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));letter-spacing:0.2em;">BOARDING PASS</div>
                  <div style="display:flex;align-items:center;gap:24px;margin-top:30px;"><span style="font-weight:800;font-size:80px;color:var(--brand-primary);">NOW</span><span style="font-weight:300;font-size:60px;color:color-mix(in srgb, var(--canvas-light-muted) 60%, var(--canvas-light-bg));">→</span><span style="font-weight:800;font-size:80px;color:var(--brand-primary);">PMF</span></div>
                  <div style="display:flex;gap:60px;margin-top:36px;"><div><div style="font-size:24px;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">GATE</div><div style="font-weight:700;font-size:36px;color:var(--brand-primary);">Activation</div></div><div><div style="font-size:24px;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">SEAT</div><div style="font-weight:700;font-size:36px;color:var(--brand-primary);">1A — focus</div></div></div>
                </div>
                <div style="width:230px;padding:44px 30px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;">
                  <div style="font-family:ui-monospace,Menlo,monospace;font-size:24px;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">FLIGHT</div><div style="font-weight:800;font-size:44px;color:var(--brand-primary);">SAAS 01</div>
                  <div style="display:flex;gap:5px;margin-top:10px;"><span style="width:8px;height:90px;background:var(--brand-primary);"></span><span style="width:4px;height:90px;background:var(--brand-primary);"></span><span style="width:4px;height:90px;background:var(--brand-primary);"></span><span style="width:8px;height:90px;background:var(--brand-primary);"></span><span style="width:4px;height:90px;background:var(--brand-primary);"></span><span style="width:4px;height:90px;background:var(--brand-primary);"></span><span style="width:8px;height:90px;background:var(--brand-primary);"></span><span style="width:4px;height:90px;background:var(--brand-primary);"></span><span style="width:4px;height:90px;background:var(--brand-primary);"></span><span style="width:8px;height:90px;background:var(--brand-primary);"></span><span style="width:4px;height:90px;background:var(--brand-primary);"></span><span style="width:4px;height:90px;background:var(--brand-primary);"></span><span style="width:8px;height:90px;background:var(--brand-primary);"></span><span style="width:4px;height:90px;background:var(--brand-primary);"></span></div>
                </div>
              </div>
            </div>
            <div style="position:absolute;bottom:90px;left:56px;right:56px;text-align:center;"><span style="font-weight:400;font-size:32px;color:var(--muted,#8a8a8a);">One destination. No layovers in feature-land.</span></div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
