<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Single 15 · gauge" description="Bold Visual Method archetype (Bold). Theme-agnostic; recolours from the brand layer (primary/secondary/accent/tint/font). One mechanism, flat canvas, focal = strongest tone." -->
<helmet>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<script src="./ds-base.js"></script>
<style>html,body{margin:0}body{background:#e6e6e6;display:flex;align-items:flex-start;justify-content:center;padding:48px;box-sizing:border-box;min-height:100vh}</style>
</helmet>

<div data-screen-label="Bold H2 · gauge" style="position:relative;width:1080px;height:1350px;overflow:hidden;background:var(--canvas-light-bg);font-family:var(--font-body);">
            <div style="position:absolute;inset:56px;border:1.5px dashed var(--canvas-light-line);pointer-events:none;"></div>
            <div style="position:absolute;top:48px;left:56px;right:56px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">Name</span><span style="font-weight:600;font-size:22px;letter-spacing:0.04em;color:color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg));">Category / function</span></div>
            <div style="position:absolute;top:160px;left:56px;right:56px;text-align:center;"><div style="font-weight:700;font-size:72px;line-height:1.0;color:var(--brand-primary);letter-spacing:-0.02em;">Activation health</div></div>
            <svg style="position:absolute;left:0;top:0;font-family:var(--font-body);" width="1080" height="1350" viewBox="0 0 1080 1350">
              <path d="M 225 860 A 315 315 0 0 1 855 860" fill="none" stroke="var(--canvas-light-soft)" stroke-width="20" stroke-linecap="round"></path>
              <path d="M 225 860 A 315 315 0 0 1 740.79 617.29" fill="none" stroke="var(--brand-primary)" stroke-width="20" stroke-linecap="round"></path><line x1="210" y1="860" x2="240" y2="860" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line><line x1="226.15" y1="758.02" x2="254.68" y2="767.29" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line><line x1="273.02" y1="666.03" x2="297.29" y2="683.66" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line><line x1="346.03" y1="593.02" x2="363.66" y2="617.29" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line><line x1="438.02" y1="546.15" x2="447.29" y2="574.68" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line><line x1="540" y1="530" x2="540" y2="560" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line><line x1="641.98" y1="546.15" x2="632.71" y2="574.68" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line><line x1="733.97" y1="593.02" x2="716.34" y2="617.29" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line><line x1="806.98" y1="666.03" x2="782.71" y2="683.66" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line><line x1="853.85" y1="758.02" x2="825.32" y2="767.29" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line><line x1="870" y1="860" x2="840" y2="860" stroke="color-mix(in srgb, var(--brand-primary) 28%, var(--canvas-light-bg))" stroke-width="4"></line>
              <line x1="540" y1="860" x2="699.36" y2="667.37" stroke="var(--brand-primary)" stroke-width="10" stroke-linecap="round"></line>
              <circle cx="540" cy="860" r="22" fill="var(--brand-primary)"></circle>
              <text x="270" y="930" font-size="28" fill="color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg))">0%</text><text x="810" y="930" text-anchor="end" font-size="28" fill="color-mix(in srgb, var(--canvas-light-muted) 72%, var(--canvas-light-bg))">100%</text>
            </svg>
            <div style="position:absolute;left:56px;right:56px;top:980px;text-align:center;"><div style="font-weight:800;font-size:150px;line-height:1;color:var(--brand-primary);letter-spacing:-0.03em;">72%</div><div style="font-weight:400;font-size:34px;color:var(--canvas-light-muted);margin-top:10px;">of signups reach first value</div></div>
          </div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1176, &quot;height&quot;: 780 },
  &quot;primary&quot;:   { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;secondary&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;accent&quot;:    { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;tint&quot;:      { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: null, &quot;min&quot;: 3, &quot;max&quot;: 16, &quot;tsType&quot;: &quot;number&quot; },
  &quot;font&quot;:      { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;Inter&quot;, &quot;Plus Jakarta Sans&quot;, &quot;Space Grotesk&quot;, &quot;Sora&quot;], &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  apply() {
    const p = this.props || {}; const r = document.documentElement.style;
    if (p.primary)   r.setProperty('--brand-primary', p.primary);
    if (p.secondary) r.setProperty('--brand-secondary', p.secondary);
    if (p.accent)    r.setProperty('--brand-accent', p.accent);
    if (p.tint != null) r.setProperty('--brand-tint', p.tint + '%');
    const font = p.font;
    if (font) {
      const id = 'tweak-font-' + font.replace(/\s+/g, '-');
      if (!document.getElementById(id)) { const l=document.createElement('link'); l.id=id; l.rel='stylesheet'; l.href='https://fonts.googleapis.com/css2?family='+font.replace(/\s+/g,'+')+':wght@400;500;600;700;800&display=swap'; document.head.appendChild(l); }
      r.setProperty('--brand-font', "'" + font + "', system-ui, sans-serif");
      r.setProperty('--brand-font-display', "'" + font + "', system-ui, sans-serif");
    }
  }
  componentDidMount() { this.apply(); }
  componentDidUpdate() { this.apply(); }
  renderVals() { return {}; }
}
</script>
</body>
</html>
