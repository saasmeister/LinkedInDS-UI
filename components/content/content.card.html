<!-- @dsCard group="Components" viewport="700x430" name="Content blocks" subtitle="Stat · quote · chips · info card · CTA" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: var(--font-body); }
  .wrap { padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 26px 34px; align-items: start; }
  .cap { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #9a9a9a; margin: 0 0 12px; }
  .cell { --fg:#18181B; --muted:#6b6b6b; --soft:#eef3f9; --line:#dbe6f1; }
  /* shrink artboard-scale type so blocks read in the card */
  .cell { --fz-stat: 64px; --fz-quote: 26px; --fz-subhead: 15px; --fz-eyebrow: 11px; --fz-body: 14px; --fz-label: 11px; }
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">
  const { Stat, Quote, Attribution, Chip, InfoCard, Cta } = (window.__dsNS||(window.__dsNS=(function(){var ks;try{ks=Object.keys(window)}catch(e){return{}}for(var i=0;i<ks.length;i++){try{var v=window[ks[i]];if(v&&typeof v==="object"&&v.Headline&&v.Canvas&&v.Stat)return v}catch(e){}}return{}})()));
  function Cell({ cap, children }) {
    return <div className="cell"><p className="cap">{cap}</p>{children}</div>;
  }
  function Demo() {
    return (
      <React.Fragment>
        <Cell cap="Stat"><Stat value="3.2×" caption="more saves per post" align="left" /></Cell>
        <Cell cap="Chips">
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <Chip>soft</Chip><Chip tone="accent">accent</Chip><Chip tone="solid">solid</Chip>
          </div>
        </Cell>
        <Cell cap="Quote + attribution">
          <Quote label="QUOTE" style={{marginBottom:14}}>The visual carries the save, not the caption.</Quote>
          <div style={{"--fg":"#18181B"}}><Attribution name="Full name" role="Role · company" /></div>
        </Cell>
        <Cell cap="Info card + CTA">
          <InfoCard number={1} label="Category" heading="Mini-heading" body="One supporting line of body copy.">
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}><Chip>tag</Chip><Chip>tag</Chip></div>
          </InfoCard>
          <div style={{marginTop:14,"--fz-quote":"16px"}}><Cta>DM me ‘WORD’ →</Cta></div>
        </Cell>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
