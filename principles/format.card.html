<!-- @dsCard group="Principles" viewport="700x190" name="Format & one idea" subtitle="1080×1350, one safe field, one idea per slide" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:#fff; color:#18181b; padding:24px 28px; display:flex; gap:26px; align-items:center; }
  .frame { width:104px; height:130px; background:var(--canvas-light-bg); border:1px solid var(--canvas-light-line); border-radius:4px; position:relative; flex:none; }
  .safe { position:absolute; inset:11px; border:1.5px dashed var(--canvas-light-muted); border-radius:2px; display:flex; align-items:center; justify-content:center; }
  .dot { width:30px; height:30px; border-radius:50%; background:var(--brand-primary); }
  .list { display:flex; flex-direction:column; gap:12px; }
  .li { display:flex; gap:12px; align-items:flex-start; }
  .k { font-family:var(--font-display); font-weight:700; font-size:15px; width:140px; flex:none; letter-spacing:-.01em; }
  .v { font-size:14px; line-height:1.45; color:var(--muted,#5a5a5a); margin:0; }
</style></head>
<body>
  <div class="frame"><div class="safe"><div class="dot"></div></div></div>
  <div class="list">
    <div class="li"><span class="k">1080 × 1350</span><p class="v">4:5 portrait. The format is non-negotiable.</p></div>
    <div class="li"><span class="k">One safe field</span><p class="v">One roomy inner margin; all content lives inside it.</p></div>
    <div class="li"><span class="k">One idea per slide</span><p class="v">A short line, one number, or one image — never a paragraph.</p></div>
    <div class="li"><span class="k">Basic shapes</span><p class="v">Circles, bars, funnels — only when they truly explain something.</p></div>
  </div>
</body></html>
