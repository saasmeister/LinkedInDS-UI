<!-- @dsCard group="Style Packs" viewport="700x300" name="Style Packs — how they work" subtitle="Optional aesthetic layers you switch on per visual" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-body,system-ui);background:#f4f1ec;color:#1f2328;padding:22px 26px}
  h1{font-size:17px;margin:0 0 4px}
  p{font-size:12.5px;line-height:1.5;color:#5f6671;margin:0 0 12px;max-width:600px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .chip{font-size:11.5px;font-weight:700;border:1px solid #d7dade;background:#fff;border-radius:999px;padding:5px 12px}
  .chip.live{border-color:#0a66c2;color:#0a66c2}
  .chip.soon{color:#a7adb4}
</style>
</head>
<body>
  <h1>Style Packs</h1>
  <p>Optional aesthetic layers. The system is flat and idea-first by default; switch a pack on for one visual to change the <em>look</em> — never the rules (one board, 3 variants, analogy-first, safe margins).</p>
  <div class="row">
    <span class="chip live">✦ Doodle</span>
    <span class="chip live">◧ Bento</span>
    <span class="chip live">▭ Paper</span>
    <span class="chip soon">Skeuomorphic · soon</span>
  </div>
</body>
</html>
