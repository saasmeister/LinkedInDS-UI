<!-- @dsCard group="Style Packs" viewport="700x250" name="✦ Doodle" subtitle="Hand-drawn: sketch borders, offset shadows, hand-lettered headline, doodle marks" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Delius+Swash+Caps&display=swap">
<style>
  html,body{margin:0}
  body{
    background:#F9F6F0;
    background-image:radial-gradient(#6B7280 1px, transparent 1px);
    background-size:22px 22px;
    color:#1F2937;
    font-family:'Inter',system-ui,sans-serif;
    padding:34px 36px;
    box-sizing:border-box;
  }
  .wrap{display:flex;gap:26px;align-items:center;max-width:640px}
  .left{flex:1;min-width:0}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6B7280;margin-bottom:8px}
  h1{
    font-family:'Delius Swash Caps',cursive;
    font-size:38px;line-height:1.12;margin:0;color:#1F2937;
  }
  .uline{position:relative;white-space:nowrap}
  .uline svg{position:absolute;left:0;right:0;bottom:-9px;width:100%;height:11px}
  .sub{font-size:14px;color:#6B7280;margin-top:16px;line-height:1.5;max-width:330px}
  /* sketch-bordered stat block — solid offset shadow, hand-drawn radius, slight tilt */
  .stat{
    flex:none;width:172px;background:#fff;
    border:3px solid #111827;
    border-radius:255px 15px 225px / 15px 225px 15px 255px;
    box-shadow:6px 7px 0 0 #111827;
    padding:22px 18px;transform:rotate(-2deg);text-align:center;
  }
  .stat .n{font-family:'Delius Swash Caps',cursive;font-size:52px;line-height:1;color:#0A66C2}
  .stat .l{font-size:12.5px;color:#6B7280;margin-top:8px;line-height:1.35}
  /* doodle star mark */
  .star{position:absolute;width:34px;height:34px;color:#0A66C2}
</style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="eyebrow">A point worth</div>
      <h1>Make it feel <span class="uline">human<svg viewBox="0 0 120 11" preserveAspectRatio="none" fill="none" stroke="#0A66C2" stroke-width="3.5" stroke-linecap="round"><path d="M3 7 C 28 2, 52 10, 74 5 S 110 3, 117 6"/></svg></span>, not generated</h1>
      <div class="sub">Sketch borders, solid offset shadows, a hand-lettered headline, and doodle marks pulled from the Icon Library.</div>
    </div>
    <div class="stat">
      <svg class="star" style="top:-15px;right:-12px;transform:rotate(8deg)" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1 L14.8 8.6 L22.5 9 L16.4 13.8 L18.6 21.3 L12 16.7 L5.4 21.3 L7.6 13.8 L1.5 9 L9.2 8.6 Z"/></svg>
      <div class="n">3×</div>
      <div class="l">more replies on hand-made posts</div>
    </div>
  </div>
</body>
</html>
