<!-- @dsCard group="Style Packs" viewport="700x300" name="◧ Bento" subtitle="Premium dark: tile mosaic, hairline borders, editorial type, one accent glow" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap">
<style>
  html,body{margin:0}
  body{
    background:#0A0A0A;
    background-image:
      radial-gradient(600px 600px at 72% 40%, rgba(249,164,116,.12), transparent 60%),
      radial-gradient(rgba(255,255,255,.02) 1px, transparent 1px);
    background-size:auto, 30px 30px;
    color:#fff;font-family:'Inter',system-ui,sans-serif;
    padding:26px 28px;box-sizing:border-box;
  }
  .grid{display:grid;grid-template-columns:1.5fr 1fr;grid-template-rows:auto auto;gap:14px;max-width:620px}
  .tile{background:#0A0A0A;border:1px solid rgba(255,255,255,.10);border-radius:24px;padding:20px 22px;box-sizing:border-box}
  .primary{grid-row:1 / 3}
  .mono{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#71717A}
  h1{font-family:'Inter Tight',sans-serif;font-weight:700;letter-spacing:-.03em;font-size:34px;line-height:1.05;margin:12px 0 0}
  h1 .ac{color:#F9A474}
  .sub{font-size:13.5px;color:#A1A1AA;margin-top:12px;line-height:1.5}
  /* focal stat tile — emphasis border + accent glow */
  .stat{border-color:rgba(255,255,255,.20);box-shadow:0 0 0 1px rgba(249,164,116,.25),0 0 24px rgba(249,164,116,.16)}
  .stat .n{font-family:'Inter Tight',sans-serif;font-weight:700;letter-spacing:-.02em;font-size:46px;line-height:1;color:#F9A474}
  .stat .l{font-size:12.5px;color:#A1A1AA;margin-top:6px;line-height:1.35}
  .util .row{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .util .row:first-of-type{margin-top:12px}
  .util .k{font-size:13px;color:#fff}
  .util .v{font-family:'JetBrains Mono',monospace;font-size:12px;color:#71717A}
</style>
</head>
<body>
  <div class="grid">
    <div class="tile primary">
      <div class="mono">01 / Insight</div>
      <h1>Premium feel,<br><span class="ac">zero</span> clutter</h1>
      <div class="sub">A dark tile mosaic. Hairline borders define the cards; one warm accent lights the number that matters.</div>
    </div>
    <div class="tile stat">
      <div class="n">3.4×</div>
      <div class="l">more demo requests</div>
    </div>
    <div class="tile util">
      <div class="mono">Proof</div>
      <div class="row"><span class="k">Onboarding</span><span class="v">−42%</span></div>
      <div class="row"><span class="k">Retention</span><span class="v">+18%</span></div>
    </div>
  </div>
</body>
</html>
