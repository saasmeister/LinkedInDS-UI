<!-- @dsCard group="Style Packs" viewport="700x260" name="▭ Paper" subtitle="Editorial & minimal: outline-only surfaces, 6px radius, paper grain, generous air" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap">
<style>
  html,body{margin:0}
  body{
    background:#FCFCF9;
    color:#222;
    font-family:'Montserrat',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:34px 36px;box-sizing:border-box;position:relative;
  }
  /* paper grain */
  body::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.06;mix-blend-mode:multiply;
    background-image:radial-gradient(#222 0.5px, transparent 0.5px);background-size:3px 3px;}
  .wrap{display:flex;gap:24px;align-items:stretch;max-width:640px;position:relative}
  .left{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
  .eyebrow{font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#909090;margin-bottom:12px}
  h1{font-weight:500;font-size:33px;line-height:1.18;margin:0;color:#222;letter-spacing:-.01em}
  h1 .ac{color:#5D8CD7}
  .sub{font-size:14px;color:#222;opacity:.6;margin-top:14px;line-height:1.5;max-width:330px}
  /* outline-only card — no shadow, 6px radius */
  .card{flex:none;width:188px;border:1px solid rgba(34,34,34,.10);border-radius:6px;padding:22px;background:#fff;display:flex;flex-direction:column;justify-content:center}
  .card .k{font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#909090}
  .card .n{font-weight:600;font-size:40px;line-height:1.05;margin-top:10px;color:#222}
  .card .r{display:flex;justify-content:space-between;font-size:13px;color:#222;opacity:.85;margin-top:14px;padding-top:12px;border-top:1px solid rgba(34,34,34,.08)}
  .card .r .v{color:#5D8CD7;font-weight:500}
</style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="eyebrow">Foundations / 01</div>
      <h1>Quiet by design,<br><span class="ac">clear</span> on purpose</h1>
      <div class="sub">Outline-only surfaces, a tight 6px radius, a faint paper grain, and a lot of air. No shadows.</div>
    </div>
    <div class="card">
      <div class="k">Result</div>
      <div class="n">+27%</div>
      <div class="r"><span>Reading time</span><span class="v">2.4×</span></div>
    </div>
  </div>
</body>
</html>
