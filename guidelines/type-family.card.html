<!-- @dsCard group="Type" viewport="700x170" name="Type family" subtitle="Inter is the neutral default — fully overridable" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:#fff; padding:22px 26px; color:#18181b; }
  .big { font-family:var(--font-display); font-weight:700; font-size:46px; letter-spacing:-0.02em; margin:0; }
  .meta { font-size:12px; color:var(--muted,#8a8a8a); margin:10px 0 18px; font-family:ui-monospace,monospace; }
  .weights { display:flex; gap:22px; align-items:baseline; }
  .weights span { font-size:24px; }
</style></head>
<body>
  <p class="big">The headline is the hero</p>
  <p class="meta">--brand-font-display · --brand-font · default: Inter</p>
  <div class="weights">
    <span style="font-weight:400">Regular</span>
    <span style="font-weight:500">Medium</span>
    <span style="font-weight:600">Semibold</span>
    <span style="font-weight:700">Bold</span>
    <span style="font-weight:800">Black</span>
  </div>
</body></html>
