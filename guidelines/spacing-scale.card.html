<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8 · 14 · 20 · 28 · 40 · 56 · 72 · 96" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; font-family:var(--font-body); background:#fff; padding:24px; display:flex; gap:14px; align-items:flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background:var(--brand-primary); border-radius:3px; width:30px; }
  .n { font-size:11px; font-family:ui-monospace,monospace; color:var(--muted,#8a8a8a); }
</style></head>
<body>
  <div class="col"><div class="bar" style="height:8px"></div><span class="n">8</span></div>
  <div class="col"><div class="bar" style="height:14px"></div><span class="n">14</span></div>
  <div class="col"><div class="bar" style="height:20px"></div><span class="n">20</span></div>
  <div class="col"><div class="bar" style="height:28px"></div><span class="n">28</span></div>
  <div class="col"><div class="bar" style="height:40px"></div><span class="n">40</span></div>
  <div class="col"><div class="bar" style="height:56px"></div><span class="n">56</span></div>
  <div class="col"><div class="bar" style="height:72px"></div><span class="n">72</span></div>
  <div class="col"><div class="bar" style="height:96px"></div><span class="n">96</span></div>
</body></html>
